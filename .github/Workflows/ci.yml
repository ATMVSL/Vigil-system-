### CI/CD — GitHub Actions YAML Create this file at .github/workflows/ci.yml in your repo: 
 yaml name: CI on:  push:   branches: [main]  pull_request:   branches: [main] jobs:  check:   name: Type Check & Lint   runs-on: ubuntu-latest   steps:    - uses: actions/checkout@v4    - uses: oven-sh/setup-bun@v2     with:      bun-version: latest    - name: Install dependencies     run: bun install --frozen-lockfile    - name: Type check     run: bun run typecheck    - name: Lint & format check     run: bun run check 
 ### Instructions 1. In your GitHub repo, click **Add file → Create new file** 2. Name it .github/workflows/ci.yml 3. Paste the YAML above 4. Commit directly to main This will run typecheck and biome check on every push to main and every PR. It uses Bun (matching your lockfile) and takes ~30 seconds to run. After that, merge [PR #1](https://github.com/ATMVSL/Vigil-system-/pull/1) and the CI will validate the Twins engine and all other changes automatically. Total additions across PR #1: **+1,347 lines** across 22 files — Ground Truth spec, Twins engine, error handling, CORS, and spec compliance tracking. Ready when you are :rocket:
