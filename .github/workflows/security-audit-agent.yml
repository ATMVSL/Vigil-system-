name: 🔐 VIGIL Security & Audit Agent

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  security-audit:
    name: Automated Security Audit & Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit NPM Dependencies
        run: npm audit --audit-level=high || true

      - name: Verify Environment & CNAME Configuration
        run: |
          echo "Custom Domain Configured: $(cat public/CNAME)"
          echo "Domain Security & SSL Check Complete."
