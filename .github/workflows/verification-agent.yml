name: 🛡️ VIGIL Verification Agent

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Automated Verification & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Verification
        run: npx tsc --noEmit

      - name: Run Biome Lint Check
        run: npx @biomejs/biome check .

      - name: Run Production Build Test
        run: npx vite build
