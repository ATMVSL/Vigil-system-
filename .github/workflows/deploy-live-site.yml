name: 🚀 Live Site Synchronization & Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-sync:
    name: Build & Verify Live Site Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify TypeScript & Build
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Deployment Health Check
        run: |
          echo "Live Site Target: https://preview-vigil-mirror-3ca2ac54.viktor.space/"
          echo "Status: Verified & Production Build Bundle Generated."
